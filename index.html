<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MindTail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet"></noscript>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c8793f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MindTail">
<style>
:root{--bg:#f7f3ee;--bg2:#ede6db;--surface:#fff;--surface2:#faf7f3;--primary:#c8793f;--primary-light:#e09a62;--primary-pale:#fdeedd;--primary-dark:#a85e28;--green:#4a9e6f;--green-pale:#e6f4ed;--green-dark:#357a54;--amber:#d4861a;--amber-pale:#fef3e2;--red:#c0392b;--red-pale:#fdecea;--text:#1e1610;--text-sub:#6b5744;--text-muted:#a8917c;--border:#e4dbd0;--border-light:#ede8e1;--shadow-sm:0 1px 8px rgba(30,22,16,.06);--shadow:0 2px 16px rgba(30,22,16,.09);--radius:20px;--radius-sm:12px;--radius-xs:8px;--tab-h:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
/* [fix] Android Chrome 주소창 때문에 dvh 제거, fill-available 사용 */
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:-webkit-fill-available;background:#ccc3b8;font-family:-apple-system,sans-serif;color:var(--text);overflow:hidden;}
/* [fix] 앱 높이 고정 - 탭바 잘림 방지 */
#app{max-width:430px;margin:0 auto;height:100%;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.22);}
.header{height:56px;background:var(--surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20;}
.header-logo{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:var(--primary);}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.hdr-name{font-size:13px;font-weight:700;}
.hdr-date{font-size:11px;color:var(--text-muted);}
/* [fix] 탭바 fixed → flex 구조 안에서 항상 하단 고정 */
.tab-bar{height:var(--tab-h);min-height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border-light);display:flex;flex-shrink:0;z-index:20;padding-bottom:env(safe-area-inset-bottom,0);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text-muted);padding:8px 0;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.tab-btn.active{color:var(--primary);}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8;}
.tab-label{font-size:10px;font-weight:700;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}
#onboarding{position:absolute;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;overflow-y:auto;}
#onboarding.hidden{display:none;}
#onboarding::-webkit-scrollbar{display:none;}
.ob-hero{background:linear-gradient(155deg,#fff9f4,#fdeedd);padding:52px 28px 40px;}
.ob-logo{font-family:'Nanum Myeongjo',serif;font-size:36px;font-weight:800;color:var(--primary);margin-bottom:12px;}
.ob-tagline{font-size:14px;color:var(--text-sub);line-height:1.7;}
.ob-body{padding:28px 24px 48px;}
.ob-sec-title{font-size:16px;font-weight:800;margin-bottom:20px;}
.ob-field{margin-bottom:14px;}
.ob-label{font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:6px;}
.ob-req{color:var(--primary);}
.ob-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:15px;background:var(--surface);outline:none;-webkit-appearance:none;}
.ob-input:focus{border-color:var(--primary);}
.ob-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ob-sg{display:flex;gap:8px;}
.ob-sb{flex:1;padding:11px 8px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:inherit;font-size:13px;font-weight:600;color:var(--text-sub);background:var(--surface);cursor:pointer;text-align:center;}
.ob-sb.on{background:var(--primary-pale);border-color:var(--primary);color:var(--primary);}
.ob-submit{width:100%;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;}
.ob-submit:active{background:var(--primary-dark);}
.pad{padding:16px;}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);}
.sec-label{font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px;}
.check-card{border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.check-card.pending{background:linear-gradient(135deg,#f0faf5,#e0f3ea);border:1.5px solid #b8dfca;}
.check-card.done{background:linear-gradient(135deg,#e8f5ed,#d4edde);border:1.5px solid #b8dfca;}
.check-label{font-size:11px;font-weight:800;color:var(--green-dark);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;opacity:.8;}
.check-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.check-sub{font-size:13px;color:var(--text-sub);margin-bottom:18px;line-height:1.5;}
.check-start-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;background:var(--primary);color:#fff;border:none;border-radius:100px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;}
.check-start-btn:active{background:var(--primary-dark);}
.check-done-badge{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(74,158,111,.15);border-radius:100px;font-size:13px;font-weight:700;color:var(--green-dark);}
.chat-wrap{display:flex;flex-direction:column;height:100%;}
.chat-top{background:var(--surface);padding:14px 20px 14px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.chat-top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chat-top-title{font-size:15px;font-weight:800;}
.chat-top-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.chat-prog-label{font-size:12px;font-weight:800;color:var(--primary);}
.prog-bar-wrap{width:100%;height:5px;background:var(--border-light);border-radius:100px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:100px;transition:width .4s ease;}
.prog-dots{display:flex;gap:4px;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.pdot.done{background:var(--primary);}
.pdot.active{background:var(--primary-light);transform:scale(1.3);}
.chat-explain{background:var(--primary-pale);border-radius:var(--radius-xs);padding:10px 14px;margin:0 16px 0;font-size:12px;color:var(--primary-dark);line-height:1.6;border-left:3px solid var(--primary-light);animation:fadeUp .3s ease;}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 16px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.chat-msgs::-webkit-scrollbar{display:none;}
.brow{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;}}
.brow.bot{justify-content:flex-start;}
.brow.user{justify-content:flex-end;}
.bavatar{width:34px;height:34px;background:var(--primary-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;align-self:flex-start;border:1.5px solid rgba(200,121,63,.2);}
.bubble{max-width:78%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.65;word-break:keep-all;}
.bubble.bot{background:var(--surface);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);}
.bubble.user{background:var(--primary);color:#fff;border-bottom-right-radius:4px;font-weight:600;}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:tb 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.chat-ans-area{background:var(--surface);border-top:1px solid var(--border-light);padding:14px 16px 16px;flex-shrink:0;}
.ans-hint{font-size:11px;color:var(--text-muted);font-weight:700;text-align:center;margin-bottom:10px;}
.ans-btns{display:flex;flex-direction:column;gap:8px;}
.ans-btn{width:100%;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;}
.ans-btn:active{background:var(--primary-pale);}
.ascore{font-size:11px;font-weight:800;padding:3px 8px;border-radius:100px;}
.s0{background:var(--green-pale);color:var(--green-dark);}
.s1{background:var(--amber-pale);color:var(--amber);}
.s2{background:var(--red-pale);color:var(--red);}
.done-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.done-wrap::-webkit-scrollbar{display:none;}
.done-msgs{padding:20px 16px 0;display:flex;flex-direction:column;gap:12px;}
.done-card{margin:14px 16px 24px;background:var(--surface);border-radius:var(--radius);padding:22px 20px;box-shadow:var(--shadow);border:1px solid var(--border-light);}
.redo-btn{width:100%;margin-top:12px;padding:12px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:inherit;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;}
.hist-header{padding:14px 14px 10px;background:var(--surface);border-bottom:1px solid var(--border-light);flex-shrink:0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{width:30px;height:30px;border:none;background:var(--bg2);border-radius:50%;cursor:pointer;font-size:16px;color:var(--text-sub);}
.cal-month-ttl{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:10px;font-weight:700;color:var(--text-muted);text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:var(--radius-xs);cursor:pointer;}
.cal-day:hover{background:var(--bg2);}
.cal-dn{font-size:12px;font-weight:600;}
.cal-day.today .cal-dn{background:var(--primary);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-legend{display:flex;gap:12px;justify-content:center;margin-top:8px;}
.cl-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-muted);}
.cl-dot{width:7px;height:7px;border-radius:50%;}
.hist-list{padding:12px 14px;}
.hist-empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;line-height:2;}
.hist-item{background:var(--surface);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);cursor:pointer;}
.hist-item:active{opacity:.8;}
.hist-date{text-align:center;min-width:38px;}
.hist-month{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;}
.hist-day{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:700;line-height:1;}
.hist-cats{display:flex;gap:6px;flex:1;}
.cchip{display:flex;flex-direction:column;align-items:center;gap:2px;}
.cchip-ic{font-size:18px;}
.cchip-lb{font-size:9px;color:var(--text-muted);font-weight:600;}
.hbadge{padding:5px 10px;border-radius:100px;font-size:11px;font-weight:800;white-space:nowrap;}
.hbadge.stable{background:var(--green-pale);color:var(--green-dark);}
.hbadge.watch{background:var(--amber-pale);color:var(--amber);}
.hbadge.change{background:var(--red-pale);color:var(--red);}
.rpad{padding:16px;}
.pbtns{display:flex;gap:6px;margin-bottom:14px;}
.pbtn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:inherit;font-size:12px;font-weight:700;color:var(--text-muted);background:var(--surface);cursor:pointer;}
.pbtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
.status-card{border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.status-card.stable{background:linear-gradient(135deg,#e8f5ed,#d0eadb);}
.status-card.watch{background:linear-gradient(135deg,#fef3e2,#fde8b8);}
.status-card.change{background:linear-gradient(135deg,#fdecea,#fac8c3);}
.status-badge{display:inline-block;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:800;margin-bottom:10px;}
.status-badge.stable{background:var(--green);color:#fff;}
.status-badge.watch{background:var(--amber);color:#fff;}
.status-badge.change{background:var(--red);color:#fff;}
.rcard{background:var(--surface);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);}
.rcard-title{font-size:13px;font-weight:800;color:var(--text-sub);margin-bottom:4px;}
.rcard-sub{font-size:11px;color:var(--text-muted);margin-bottom:12px;}
.no-data{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;line-height:2;}
.spad{padding:16px;}
.sprof{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);}
.savatar{width:54px;height:54px;border-radius:50%;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid rgba(200,121,63,.2);}
.sedit-btn{margin-left:auto;padding:7px 14px;border:1.5px solid var(--border);border-radius:100px;font-family:inherit;font-size:12px;font-weight:700;color:var(--text-sub);background:none;cursor:pointer;flex-shrink:0;}
.ssec{background:var(--surface);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden;}
.ssec-title{font-size:10px;font-weight:800;color:var(--text-muted);padding:12px 18px 4px;text-transform:uppercase;letter-spacing:.5px;}
.srow{padding:14px 18px;border-top:1px solid var(--border-light);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.srow:first-of-type{border-top:none;}
.srow:active{background:var(--surface2);}
.srow-label{font-size:14px;font-weight:600;}
.srow-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.srow-label.danger{color:var(--red);}
.danger-badge{background:var(--red);color:#fff;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:800;flex-shrink:0;}
.modal-bd{display:none;position:absolute;inset:0;z-index:60;background:rgba(30,22,16,.5);align-items:flex-end;}
.modal-bd.open{display:flex;}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 20px 44px;}
.modal-sheet::-webkit-scrollbar{display:none;}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px;}
.mtitle{font-size:17px;font-weight:800;margin-bottom:16px;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light);}
.drow:last-of-type{border-bottom:none;}
.dcat{display:flex;align-items:center;gap:8px;}
.dcat-ic{font-size:16px;}
.dcat-lb{font-size:13px;color:var(--text-sub);font-weight:600;}
.dans{font-size:13px;font-weight:700;}
.dsbadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:100px;margin-left:6px;}
.dnote{font-size:12px;color:var(--text-muted);line-height:1.6;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-xs);margin-top:12px;}
.dredo-btn{width:100%;margin-top:12px;padding:13px;background:var(--primary-pale);border:none;border-radius:var(--radius-xs);font-family:inherit;font-size:14px;font-weight:700;color:var(--primary);cursor:pointer;}
.efields{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.confirm-modal{display:none;position:absolute;inset:0;z-index:80;background:rgba(30,22,16,.5);align-items:center;justify-content:center;padding:24px;}
.confirm-modal.open{display:flex;}
.cbox{background:var(--surface);border-radius:var(--radius);padding:24px 20px;width:100%;}
.ctitle{font-size:16px;font-weight:800;margin-bottom:8px;}
.csub{font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:20px;}
.cbtns{display:flex;gap:10px;}
.ccancel{flex:1;padding:13px;background:var(--bg2);border:none;border-radius:var(--radius-xs);font-family:inherit;font-size:14px;font-weight:700;color:var(--text-sub);cursor:pointer;}
.cok{flex:1;padding:13px;background:var(--red);border:none;border-radius:var(--radius-xs);font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(30,22,16,.9);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;white-space:nowrap;z-index:200;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
<div id="onboarding">
  <div class="ob-hero">
    <div style="font-size:48px;margin-bottom:16px">🐾</div>
    <div class="ob-logo">MindTail</div>
    <div class="ob-tagline">매일 10초, 반려견의 인지 행동 변화를<br>기록하고 관찰하는 앱이에요.</div>
  </div>
  <div class="ob-body">
    <div class="ob-sec-title">우리 강아지를 알려주세요</div>
    <div class="ob-field"><div class="ob-label">강아지 이름 <span class="ob-req">*</span></div><input class="ob-input" id="ob-name" placeholder="예: 뭉이" maxlength="20"></div>
    <div class="ob-row">
      <div class="ob-field"><div class="ob-label">생년월일 <span class="ob-req">*</span></div><input class="ob-input" id="ob-birth" placeholder="YYYY-MM-DD" maxlength="10"></div>
      <div class="ob-field"><div class="ob-label">체중</div><input class="ob-input" id="ob-weight" placeholder="예: 3.5kg" maxlength="10"></div>
    </div>
    <div class="ob-field"><div class="ob-label">품종</div><input class="ob-input" id="ob-breed" placeholder="예: 말티즈" maxlength="30"></div>
    <div class="ob-field"><div class="ob-label">성별</div><div class="ob-sg"><button class="ob-sb on" id="ob-gm" onclick="selG('m')">수컷 ♂</button><button class="ob-sb" id="ob-gf" onclick="selG('f')">암컷 ♀</button></div></div>
    <div class="ob-field"><div class="ob-label">중성화</div><div class="ob-sg"><button class="ob-sb on" id="ob-ny" onclick="selN('y')">했어요</button><button class="ob-sb" id="ob-nn" onclick="selN('n')">안 했어요</button></div></div>
    <button class="ob-submit" onclick="saveOB()">시작하기 🐾</button>
  </div>
</div>
<div class="header"><div class="header-logo">MindTail</div><div class="hdr-right"><div class="hdr-name" id="hdrName">—</div><div class="hdr-date" id="hdrDate">—</div></div></div>
<div class="content">
  <div class="screen active" id="screen-home"><div class="scroll-area"><div class="pad" id="homeContent"></div></div></div>
  <div class="screen" id="screen-chat">
    <div class="chat-wrap" id="chatWrap">
      <div class="chat-top">
        <div class="chat-top-row1"><div><div class="chat-top-title">오늘 행동 체크</div><div class="chat-top-sub" id="chatSub">질문에 답해주세요</div></div><div class="chat-prog-label" id="progLabel"></div></div>

const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const diffDays=(a,b)=>Math.floor((new Date(b)-new Date(a))/86400000);
const calcAge=b=>{if(!b)return null;const bd=new Date(b),n=new Date();let y=n.getFullYear()-bd.getFullYear();return(n.getMonth()-bd.getMonth()<0||(n.getMonth()-bd.getMonth()===0&&n.getDate()<bd.getDate()))?y-1:y;};
function fmtDate(s){const[y,m,d]=s.split("-");const dw=["일","월","화","수","목","금","토"];return `${y}년 ${+m}월 ${+d}일 (${dw[new Date(s).getDay()]})`;}
function fmtBirth(e){let v=e.target.value.replace(/\D/g,"");if(v.length>4)v=v.slice(0,4)+"-"+v.slice(4);if(v.length>7)v=v.slice(0,7)+"-"+v.slice(7);e.target.value=v.slice(0,10);}

// [fix] sessionCount는 finishChat에서만 증가 - 여기선 streak/lastCheckDate만 업데이트
function updateStreak(date){const m=lMeta();const p=m.lastCheckDate;m.streak=!p?1:diffDays(p,date)===1?(m.streak||0)+1:diffDays(p,date)===0?m.streak:1;m.lastCheckDate=date;sMeta(m);return m.streak;}
function updateTracking(ans,date){const t=lTK();ans.forEach(a=>{if(!t[a.cat])t[a.cat]={rd:[],active:false,at:null};if(a.score===2){t[a.cat].rd.push(date);t[a.cat].rd=t[a.cat].rd.filter(d=>diffDays(d,date)<=14);if(t[a.cat].rd.length>=2){t[a.cat].active=true;t[a.cat].at=date;}}if(t[a.cat].active&&t[a.cat].at&&diffDays(t[a.cat].at,date)>14)t[a.cat].active=false;});ss(K.TK,t);}
function catScore(cat,qh,ah,today){let s=CWS[cat]||1;if(!qh.slice(-5).some(x=>x.qs.some(q=>q.cat===cat)))s+=2;const c7=new Date(today);c7.setDate(c7.getDate()-7);let r7=0,m7=0;ah.forEach(sess=>{const sd=new Date(sess.date);sess.answers.forEach(a=>{if(a.cat!==cat)return;if(sd>=c7){if(a.score===2)r7++;if(a.score===1)m7++;}});});if(r7>0)s+=2;if(m7>=2)s+=1;const t=lTK();if(t[cat]?.active)s+=2;if(qh.slice(-1).some(x=>x.qs.some(q=>q.cat===cat)))s-=3;if(qh.slice(-3).filter(x=>x.qs.some(q=>q.cat===cat)).length>=2)s-=2;return s;}
function selCat(cands,used,qh,ah,today){return cands.filter(c=>!used.includes(c)).map(c=>({c,s:catScore(c,qh,ah,today)})).sort((a,b)=>b.s-a.s||Math.random()-.5)[0]?.c||null;}
function selQ(cat,uI,uT,qh){const pool=QP.filter(q=>q.cat===cat);for(const lim of[7,5,3,0]){const rids=new Set();if(lim>0)qh.slice(-lim).forEach(s=>s.qs.forEach(q=>rids.add(q.id)));const cands=pool.filter(q=>!uI.includes(q.id)&&!uT.includes(q.tag)&&!rids.has(q.id));if(cands.length>0){const t=lTK();if(t[cat]?.active){const ah2=lAH();const rt=new Set();ah2.slice(-14).forEach(s=>s.answers.forEach(a=>{if(a.cat===cat&&a.score===2)rt.add(a.tag);}));const pref=cands.filter(q=>rt.has(q.tag));if(pref.length)return pref[Math.floor(Math.random()*pref.length)];}return cands[Math.floor(Math.random()*cands.length)];}}return pool[Math.floor(Math.random()*pool.length)];}
function isTamsa(){return(lMeta().sessionCount||0)<7;}
function genTCov(qh){const c={};ALLC.forEach(x=>c[x]=0);qh.forEach(s=>s.qs.forEach(q=>{if(c[q.cat]!==undefined)c[q.cat]++;}));return c;}
function generateQs(today){const qh=lQH(),ah=lAH(),uC=[],uI=[],uT=[],res=[];const push=cat=>{const q=selQ(cat,uI,uT,qh);if(q){res.push(q);uI.push(q.id);uT.push(q.tag);}};if(isTamsa()){const cov=genTCov(qh);const need=c=>CORE.includes(c)?cov[c]<2:cov[c]<1;const cp=CORE.filter(need);const c1=selCat(cp.length?cp:CORE,uC,qh,ah,today)||CORE[0];uC.push(c1);push(c1);const bp=BEHAV.filter(c=>need(c)&&!uC.includes(c));const c2=selCat(bp.length?bp:BEHAV,uC,qh,ah,today);if(c2){uC.push(c2);push(c2);}for(let i=0;i<2;i++){const rem=ALLC.filter(c=>!uC.includes(c));const rp=rem.filter(need);const c=selCat(rp.length?rp:rem,uC,qh,ah,today)||rem[0];if(c){uC.push(c);push(c);}}}else{const c1=selCat(CORE,uC,qh,ah,today)||CORE[0];uC.push(c1);push(c1);const c2=selCat(BEHAV,uC,qh,ah,today)||BEHAV.find(c=>!uC.includes(c));if(c2){uC.push(c2);push(c2);}for(let i=0;i<2;i++){const rem=ALLC.filter(c=>!uC.includes(c));const c=selCat(rem,uC,qh,ah,today)||rem[0];if(c){uC.push(c);push(c);}}}return res;}
// [fix] 표시 조건 calcMS 안에서만 판단 (sessionCount<7 제거, tot<8 기준 유지)
function calcMS(today){const ah=lAH();const cut=new Date(today);cut.setDate(cut.getDate()-14);const cs={},cc={};ah.forEach(s=>{if(new Date(s.date)<cut)return;s.answers.forEach(a=>{if(!cs[a.cat]){cs[a.cat]=0;cc[a.cat]=0;}cs[a.cat]+=a.score;cc[a.cat]++;});});const cats=Object.keys(cs).filter(c=>cc[c]>0);if(!cats.length)return null;let wS=0,wT=0;cats.forEach(c=>{const avg=cs[c]/cc[c];const w=CWR[c]||1;wS+=avg*w;wT+=w;});const tot=Object.values(cc).reduce((a,b)=>a+b,0);if(tot<8)return null;return{score:Math.round(Math.max(0,Math.min(100,100-(wS/wT/2)*100))),tot};}
// [fix] Mind Score 구간 3단계 통일: 75이상=안정 / 50~74=경미한 변화 / 49이하=변화 관찰 중
function sifo(s){if(s>=75)return{label:"안정",cls:"stable"};if(s>=50)return{label:"경미한 변화",cls:"watch"};return{label:"변화 관찰 중",cls:"change"};}
function recSt(rec){if(!rec)return"stable";const mx=rec.answers.reduce((m,a)=>Math.max(m,a.score),0);return mx===0?"stable":mx===1?"watch":"change";}
let CS={date:null,at:null,qs:[],idx:0,answers:[],hist:[],done:false};
function saveDraft(){if(!CS.date)return;sDraft(CS.date,{date:CS.date,at:CS.at,qs:CS.qs,idx:CS.idx,answers:CS.answers,hist:CS.hist});}

async function askQ(){if(CS.idx>=CS.qs.length){finishChat();return;}const q=CS.qs[CS.idx];const cat=q.cat;// 설명 표시 조건: 첫 질문이거나 새 카테고리이거나 변화 감지 응답 후
const isFirst=CS.idx===0;const isNewCat=cat!==_lastCat;const prevAns=CS.answers.length>0?CS.answers[CS.answers.length-1]:null;const isPrevAlert=prevAns&&prevAns.score>=1;const showExplain=isFirst||isNewCat||isPrevAlert;if(showExplain&&CAT_DESC[cat]){const ex=document.getElementById("chatExplain");ex.style.display="block";ex.innerHTML=`<div class="chat-explain">${CAT_DESC[cat]}</div>`;}_lastCat=cat;await botMsg(q.q);showAns(q);}

async function handleAns(q,opt){document.getElementById("chatAnsArea").style.display="none";document.getElementById("chatExplain").style.display="none";CS.hist.push({r:"user",t:opt.label});addBub("user",opt.label);CS.answers.push({cat:q.cat,tag:q.tag,q:q.q,answer:opt.label,score:opt.score});CS.idx++;updateProg();saveDraft();// 즉시 피드백 (4번): 1~2줄 간단 피드백
const fb=CAT_FEEDBACK[q.cat]?.[opt.score];if(fb){await botMsg(fb,500);}if(CS.idx>=CS.qs.length){await new Promise(r=>setTimeout(r,300));finishChat();}else await askQ();}
function finishChat(){const today=CS.date;const ah=lAH();ah.push({date:today,answers:CS.answers});if(ah.length>60)ah.splice(0,ah.length-60);ss(K.AH,ah);const qh=lQH();qh.push({date:today,qs:CS.qs.map(q=>({id:q.id,cat:q.cat,tag:q.tag}))});if(qh.length>30)qh.splice(0,qh.length-30);ss(K.QH,qh);updateTracking(CS.answers,today);const meta=lMeta();meta.sessionCount=(meta.sessionCount||0)+1;sMeta(meta);updateStreak(today);const ms=calcMS(today);const rec={date:today,answers:CS.answers,ms,status:recSt({answers:CS.answers})};sRec(today,rec);dDraft(today);CS.done=true;invalidateCache();
  // 체크 완료 → SW에 알려서 리마인드 취소
  try{if(swReg&&swReg.active)swReg.active.postMessage({type:"CHECKED_TODAY"});}catch(e){}
  // 앱 fallback 리마인드 타이머도 취소
  if(window._remindTimer){clearTimeout(window._remindTimer);window._remindTimer=null;}
  showDone(rec,false);}
function showDone(rec,already){document.getElementById("chatWrap").style.display="none";const cd=document.getElementById("chatDone");cd.style.display="flex";cd.style.flexDirection="column";const msgs=document.getElementById("doneMsgs");msgs.innerHTML="";if(!already&&CS.hist.length>0){CS.hist.forEach(m=>{const r=document.createElement("div");r.className=`brow ${m.r}`;r.innerHTML=m.r==="bot"?`<div class="bavatar">🐾</div><div class="bubble bot">${m.t}</div>`:`<div class="bubble user">${m.t}</div>`;msgs.appendChild(r);});}else{const r=document.createElement("div");r.className="brow bot";r.innerHTML=`<div class="bavatar">🐾</div><div class="bubble bot">오늘 기록은 이미 완료됐어! 내일 또 봐 🐾</div>`;msgs.appendChild(r);}const card=document.getElementById("doneCard");const mx=rec.answers.reduce((m,a)=>Math.max(m,a.score),0);const meta=lMeta();const streak=meta.streak||1;const ms=rec.ms;const compMsg=mx===0?"최근 인지 행동은 비교적 안정적으로 관찰돼.":mx===1?"일부 항목에서 경미한 변화가 관찰됐어. 지속되면 기록을 참고해봐.":"몇 가지 행동 변화가 관찰됐어. 기록을 계속 확인해보자.";card.innerHTML=`<div style="text-align:center;padding:4px 0 16px"><div style="font-size:24px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:800;margin-bottom:4px">체크 완료!</div><div style="font-size:13px;color:var(--green-dark);font-weight:600">${lP()?.name||""}와 보낸 소중한 시간이 차곡차곡 쌓이고 있어요 🐾</div></div><div style="background:var(--green-pale);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div><div style="font-size:11px;font-weight:700;color:var(--green-dark);margin-bottom:2px">🔥 연속 체크</div><div style="font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:var(--green-dark)">${streak}일째</div></div>${ms&&ms.tot>=8?`<div style="text-align:right"><div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">Mind Score</div><div style="font-family:'Nanum Myeongjo',serif;font-size:28px;font-weight:800;color:var(--primary)">${ms.score}</div><div style="font-size:11px;color:var(--text-muted)">${sifo(ms.score).label}</div></div>`:`<div style="font-size:12px;color:var(--text-muted);text-align:right">기록이 쌓이면<br>Mind Score가<br>표시돼요</div>`}</div><div style="font-size:13px;color:var(--text-sub);line-height:1.7;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-xs);border-left:3px solid var(--primary-light)">${compMsg}<br><span style="font-size:12px;color:var(--text-muted)">변화가 계속되면 병원 상담 때 이 기록을 참고해주세요.</span></div>${already?"":` <button class="redo-btn" onclick="redoToday()">오늘 기록 다시 하기</button>`}`;setTimeout(()=>{document.querySelector(".done-wrap").scrollTop=9999;},100);}
function redoToday(){const today=todayStr();sd(K.rec(today));const idx=lIdx().filter(d=>d!==today);ss(K.IDX,idx);dDraft(today);const ah=lAH().filter(s=>s.date!==today);ss(K.AH,ah);const qh=lQH().filter(s=>s.date!==today);ss(K.QH,qh);startChat(true);}
function calcRecentChanges(today){// 최근 7일 카테고리별 변화 분석
  const cut=new Date(today);cut.setDate(cut.getDate()-7);
  const catData={};ALLC.forEach(c=>catData[c]={cnt:0,score:0});
  const ah=lAH();
  ah.forEach(s=>{if(new Date(s.date)<cut)return;s.answers.forEach(a=>{if(catData[a.cat]){catData[a.cat].cnt++;catData[a.cat].score+=a.score;}});});
  return ALLC.map(cat=>{const d=catData[cat];if(d.cnt===0)return null;const avg=d.score/d.cnt;return{cat,avg,status:avg>=1?"change":avg>=0.3?"watch":"stable"};}).filter(Boolean);}
function getMostChangedCat(today){// Mind Score에 가장 변화가 큰 카테고리
  const cut=new Date(today);cut.setDate(cut.getDate()-14);
  const catData={};ALLC.forEach(c=>catData[c]={cnt:0,score:0});
  const ah=lAH();
  ah.forEach(s=>{if(new Date(s.date)<cut)return;s.answers.forEach(a=>{if(catData[a.cat]){catData[a.cat].cnt++;catData[a.cat].score+=a.score;}});});
  let top=null,topAvg=0;
  ALLC.forEach(cat=>{const d=catData[cat];if(d.cnt>0){const avg=d.score/d.cnt;if(avg>topAvg){topAvg=avg;top=cat;}}});
  return topAvg>0.3?top:null;}
function renderHome(){const p=lP();if(!p)return;const today=todayStr();const rec=lRec(today);const meta=lMeta();const draft=lDraft(today);const age=calcAge(p.birth);const daysT=p.registeredAt?diffDays(p.registeredAt.slice(0,10),today)+1:1;const tipIdx=Math.floor(Date.now()/86400000)%TIPS.length;const ms=calcMS(today);const isDone=!!rec;

        <div><div class="srow-label">데일리 알림</div><div class="srow-sub">${togOn?"켜짐 · "+almTime+" 알림":"꺼짐"}</div></div>
        ${togHTML}
      </div>
      <div class="srow" id="almTimeRow" style="cursor:default;display:${togOn?"flex":"none"}">
        <div><div class="srow-label">알림 시간</div><div class="srow-sub">매일 이 시간에 알림이 와요</div></div>
        <input type="time" id="almTimeInput" value="${almTime}" onchange="saveAlarmTime(this.value)"
          style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:inherit;font-size:14px;font-weight:700;color:var(--text);background:var(--surface);outline:none;-webkit-appearance:none">
      </div>
      <div class="srow" style="cursor:default">
        <div><div class="srow-label">테스트 알림</div><div class="srow-sub">지금 바로 알림 테스트</div></div>
        <button onclick="sendTestNotif()" style="padding:8px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:100px;font-family:inherit;font-size:12px;font-weight:700;color:var(--text-sub);cursor:pointer">테스트</button>
      </div>
    </div>
    <div class="ssec"><div class="ssec-title">데이터</div><div class="srow" onclick="exportData()"><div><div class="srow-label">데이터 JSON 복사</div><div class="srow-sub">기록 전체를 클립보드에 복사해요</div></div><div style="color:var(--text-muted)">→</div></div><div class="srow" onclick="document.getElementById('confirmModal').classList.add('open')"><div><div class="srow-label danger">전체 데이터 초기화</div><div class="srow-sub">모든 기록과 프로필이 삭제돼요</div></div><div class="danger-badge">초기화</div></div></div>
    <div class="ssec"><div class="ssec-title">정보</div><div class="srow"><div class="srow-label">MindTail v2.4.0</div></div><div class="srow"><div><div class="srow-label">이 앱은 의료 진단 도구가 아니에요</div><div class="srow-sub">반려견 행동 변화 기록 참고용이에요</div></div></div></div>
  `;
}
// [fix] toggleAlarm이 renderSettings를 다시 호출해서 토글 상태 반영
function toggleAlarm(enabled){
  try{
    if(enabled&&typeof Notification!=="undefined"&&Notification.permission!=="granted"){
      reqNotifPerm();return; // 권한 없으면 토글 못 킴
    }
    const alm=lAlarm();alm.enabled=enabled;sAlarm(alm);
    if(enabled){scheduleAlarm(alm.time);showToast(`${alm.time} 알림이 설정됐어요 🔔`);}
    else{cancelAlarm();showToast("알림이 꺼졌어요");}
    renderSettings(); // UI 전체 갱신 → 토글 색상/위치 정확히 반영
  }catch(e){}
}
function openEdit(){const p=lP();if(!p)return;document.getElementById("ed-name").value=p.name||"";document.getElementById("ed-birth").value=p.birth||"";document.getElementById("ed-breed").value=p.breed||"";document.getElementById("ed-weight").value=p.weight||"";eG=p.gender||"m";eN=p.neuter||"y";document.getElementById("ed-gm").classList.toggle("on",eG==="m");document.getElementById("ed-gf").classList.toggle("on",eG==="f");document.getElementById("ed-ny").classList.toggle("on",eN==="y");document.getElementById("ed-nn").classList.toggle("on",eN==="n");document.getElementById("profileModal").classList.add("open");}
function eSelG(v){eG=v;document.getElementById("ed-gm").classList.toggle("on",v==="m");document.getElementById("ed-gf").classList.toggle("on",v==="f");}
function eSelN(v){eN=v;document.getElementById("ed-ny").classList.toggle("on",v==="y");document.getElementById("ed-nn").classList.toggle("on",v==="n");}
function saveEdit(){const name=document.getElementById("ed-name").value.trim();if(!name){showToast("이름을 입력해주세요");return;}const p=lP();sP({...p,name,birth:document.getElementById("ed-birth").value.trim(),breed:document.getElementById("ed-breed").value.trim(),weight:document.getElementById("ed-weight").value.trim(),gender:eG,neuter:eN});document.getElementById("profileModal").classList.remove("open");updateHdr();renderSettings();showToast("저장됐어요!");}
function exportData(){const idx=lIdx();const recs={};idx.forEach(d=>{recs[d]=lRec(d);});const data={profile:lP(),index:idx,records:recs,qhist:lQH(),ahist:lAH(),tracking:lTK(),exportedAt:new Date().toISOString()};const str=JSON.stringify(data,null,2);if(navigator.clipboard){navigator.clipboard.writeText(str).then(()=>showToast("복사됐어요!"));}else{const ta=document.createElement("textarea");ta.value=str;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("복사됐어요!");}}
// ─── ALARM ───────────────────────────────────────────
const K_ALM=`${PFX}:alarm`;
const lAlarm=()=>{try{return sg(K_ALM)||{enabled:false,time:"21:00"};}catch{return{enabled:false,time:"21:00"};}};
const sAlarm=v=>{try{ss(K_ALM,v);}catch{}};

let swReg=null;
function initSW(){
  // [fix] async/await 제거 - 앱 초기화를 절대 블로킹하지 않음
  if(!("serviceWorker" in navigator))return;
  try{
    navigator.serviceWorker.register("/sw.js")
      .then(reg=>{
        swReg=reg;
        try{
          const alm=lAlarm();
          if(alm.enabled&&typeof Notification!=="undefined"&&Notification.permission==="granted"){
            scheduleAlarm(alm.time);
          }
        }catch(e){}
      })
      .catch(e=>console.warn("SW 등록 실패 (무시해도 됨):",e));
  }catch(e){}
}

function reqNotifPerm(){
  try{
    if(typeof Notification==="undefined"){showToast("이 브라우저는 알림을 지원하지 않아요");return;}
    Notification.requestPermission().then(perm=>{
      if(perm==="granted")showToast("알림이 허용됐어요! ✅");
      else if(perm==="denied")showToast("알림이 차단됐어요. 브라우저 설정에서 허용해주세요.");
      renderSettings();
    });
  }catch(e){showToast("알림 설정 중 오류가 발생했어요");}
}

function saveAlarmTime(val){
  try{
    const alm=lAlarm();alm.time=val;sAlarm(alm);
    if(alm.enabled)scheduleAlarm(val);
    showToast(`${val} 으로 알림 시간이 변경됐어요`);
  }catch(e){}
}

function scheduleAlarm(timeStr){
  try{
    if(window._almTimer)clearTimeout(window._almTimer);
    const[h,m]=timeStr.split(":").map(Number);
    const petName=lP()?.name||"반려견";
    if(swReg&&swReg.active){
      try{swReg.active.postMessage({type:"SCHEDULE_ALARM",hour:h,minute:m,petName});}catch(e){}
    }
    // 앱이 열려있을 때 fallback 타이머 (SW가 없는 환경 대비)
    const now=new Date();const next=new Date();
    next.setHours(h,m,0,0);
    if(next<=now)next.setDate(next.getDate()+1);
    window._almTimer=setTimeout(()=>{try{fireLocalNotif();}catch(e){}},next-now);
  }catch(e){}
}

function cancelAlarm(){
  try{
    if(swReg&&swReg.active)swReg.active.postMessage({type:"CANCEL_ALARM"});
    if(window._almTimer)clearTimeout(window._almTimer);
    if(window._remindTimer)clearTimeout(window._remindTimer);
  }catch(e){}
}

// ─── 요일별 1차 알림 문구 (앱 fallback용) ───────────
const LOC_MSG_PRIMARY=[
  n=>[`오늘 ${n}는 어떻게 지냈나요? 🌙`,`일요일 저녁, ${n}의 하루를 짧게 기록해봐요`],
  n=>[`${n}와 함께한 월요일은 어땠나요? 🐾`,`한 주의 시작, ${n}의 행동을 체크해봐요`],
  n=>[`오늘 ${n}의 행동을 확인해볼까요? 🐾`,`${n}의 오늘 하루를 기록해봐요`],
  n=>[`${n}, 오늘도 잘 지냈나요? 🐾`,`수요일 체크! ${n}의 행동 변화를 살펴봐요`],
  n=>[`오늘 ${n}의 행동을 체크해봐요 🐾`,`${n}의 하루를 기록하면 변화를 알 수 있어요`],
  n=>[`${n}와 함께한 하루 어땠나요? 🐾`,`주말 전 마지막 체크! ${n}의 오늘을 기록해봐요`],
  n=>[`주말에도 ${n} 체크를 잊지 마세요 🐾`,`${n}의 주말 행동도 소중한 기록이에요`],
];
function fireLocalNotif(){
  try{
    const today=todayStr();
    if(lRec(today))return;
    if(typeof Notification==="undefined"||Notification.permission!=="granted")return;
    const p=lP();const name=p?.name||"반려견";
    const dow=new Date().getDay();
    const[title,body]=LOC_MSG_PRIMARY[dow](name);
    const opts={body,icon:"/icon-512.png",badge:"/icon-512.png",tag:"mindtail-primary",renotify:true,data:{action:"open_chat"}};
    if(swReg){swReg.showNotification(title,opts).catch(()=>{try{new Notification(title,opts);}catch(e){}});}
    else{try{new Notification(title,opts);}catch(e){}}
    // 앱 fallback: 90분 후 리마인드
    if(window._remindTimer)clearTimeout(window._remindTimer);
    window._remindTimer=setTimeout(()=>{
      try{
        if(lRec(todayStr()))return;
        const rname=lP()?.name||"반려견";
        const rbody=`오늘 ${rname}의 기록이 아직 없어요 🐾`;
        const ropts={body:rbody,icon:"/icon-512.png",tag:"mindtail-remind",renotify:true,data:{action:"open_chat"}};
        if(swReg){swReg.showNotification("MindTail 🐾",ropts).catch(()=>{try{new Notification("MindTail 🐾",ropts);}catch(e){}});}
        else{try{new Notification("MindTail 🐾",ropts);}catch(e){}}
      }catch(e){}
    },90*60*1000);
    const alm=lAlarm();if(alm.enabled)scheduleAlarm(alm.time);
  }catch(e){}
}

function sendTestNotif(){
  try{
    if(typeof Notification==="undefined"||Notification.permission!=="granted"){
      showToast("먼저 알림 권한을 허용해주세요");reqNotifPerm();return;
    }
    const p=lP();const name=p?.name||"반려견";
    const dow=new Date().getDay();
    const[title,body]=LOC_MSG_PRIMARY[dow](name);
    const opts={body,icon:"/icon-512.png",badge:"/icon-512.png",tag:"mindtail-test",data:{action:"open_chat"}};
    if(swReg){
      swReg.showNotification(title,opts)
        .then(()=>showToast("테스트 알림을 보냈어요! 🔔"))
        .catch(()=>{try{new Notification(title,opts);showToast("테스트 알림을 보냈어요! 🔔");}catch(e){showToast("알림 실패 - 앱을 홈화면에서 실행해주세요");}});
    }else{
      try{new Notification(title,opts);showToast("테스트 알림을 보냈어요! 🔔");}
      catch(e){showToast("알림 실패 - 앱을 홈화면에서 실행해주세요");}
    }
  }catch(e){showToast("알림 실패 - 앱을 홈화면에서 실행해주세요");}
}
// ─── ONBOARDING ──────────────────────────────────────
let obG="m",obN="y";
function selG(v){obG=v;document.getElementById("ob-gm").classList.toggle("on",v==="m");document.getElementById("ob-gf").classList.toggle("on",v==="f");}
function selN(v){obN=v;document.getElementById("ob-ny").classList.toggle("on",v==="y");document.getElementById("ob-nn").classList.toggle("on",v==="n");}
function saveOB(){const name=document.getElementById("ob-name").value.trim();const birth=document.getElementById("ob-birth").value.trim();if(!name){showToast("강아지 이름을 입력해주세요");return;}if(!birth){showToast("생년월일을 입력해주세요");return;}sP({name,birth,breed:document.getElementById("ob-breed").value.trim(),weight:document.getElementById("ob-weight").value.trim(),gender:obG,neuter:obN,registeredAt:new Date().toISOString(),species:"dog",userId:"local_user"});document.getElementById("onboarding").classList.add("hidden");invalidateCache();updateHdr();renderHome();}
document.getElementById("ob-birth").addEventListener("input",fmtBirth);
document.getElementById("ed-birth").addEventListener("input",fmtBirth);
function updateHdr(){const p=lP();const d=new Date();const dw=["일","월","화","수","목","금","토"];document.getElementById("hdrDate").textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${dw[d.getDay()]})`;document.getElementById("hdrName").textContent=p?p.name:"—";}
// [fix] 탭 전환 성능 개선 - 한 번 렌더링된 탭은 캐시, 홈/히스토리는 데이터 변경 가능하니 항상 갱신
const _rendered={};
function switchTab(tab){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const sid=tab==="chat"?"screen-chat":`screen-${tab}`;
  document.getElementById(sid)?.classList.add("active");
  const tid=tab==="chat"?"tab-home":`tab-${tab}`;
  document.getElementById(tid)?.classList.add("active");
  if(tab==="chat"){document.getElementById("tab-home").classList.remove("active");return;}
  // 홈은 체크 상태가 바뀌니 항상 갱신, 나머지는 첫 방문 때만 렌더
  if(tab==="home"){renderHome();return;}
  if(tab==="history"){renderHistory();return;}
  if(tab==="report"&&!_rendered.report){renderReport();_rendered.report=true;return;}
  if(tab==="settings"&&!_rendered.settings){renderSettings();_rendered.settings=true;return;}
}
// 설정/리포트 탭은 데이터 변경 시 캐시 무효화
function invalidateCache(){_rendered.report=false;_rendered.settings=false;}
// ─── SW → 앱 메시지 수신 (알림 클릭 시 화면 전환) ───
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data?.type==='NOTIF_CLICK'){
      // 알림 클릭 → 챗봇 화면으로 이동
      switchTab('chat');startChat();
    }
  });
}
// URL 파라미터로 액션 전달된 경우 처리 (앱이 닫혀있다 열릴 때)
function handleUrlAction(){
  try{
    const params=new URLSearchParams(location.search);
    const action=params.get('action');
    if(action==='open_chat'){
      history.replaceState(null,'',location.pathname);
      setTimeout(()=>{switchTab('chat');startChat();},300);
    }
  }catch(e){}
}
function init(){
  updateHdr();
  setTimeout(()=>initSW(), 0);
  const p=lP();
  if(!p){document.getElementById("onboarding").classList.remove("hidden");return;}
  document.getElementById("onboarding").classList.add("hidden");
  renderHome();
  handleUrlAction();
}
init();
</script>
